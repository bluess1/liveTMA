<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>live@TMA</title>
<style>
  :root{
    --bg:#000000; --bg2:#1c1c1e; --bg3:#2c2c2e;
    --label:#ffffff; --label2:rgba(235,235,245,0.6); --label3:rgba(235,235,245,0.3);
    --sep:rgba(84,84,88,0.55); --accent:#0A84FF; --danger:#FF453A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--label);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;min-height:100vh;padding-bottom:100px;-webkit-font-smoothing:antialiased;}
  nav{position:sticky;top:0;z-index:20;background:rgba(0,0,0,0.78);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--sep);padding:10px 16px 8px;}
  .navrow{display:flex;align-items:baseline;justify-content:space-between;}
  .title{font-size:22px;font-weight:700;letter-spacing:-0.4px;}
  .count{font-size:13px;color:var(--label2);font-weight:500;}
  .wrap{max-width:900px;margin:0 auto;padding:0 3px;}
  .grid{display:grid;grid-template-columns:1fr;gap:3px;margin-top:3px;}
  @media (min-width:640px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:980px){ .grid{grid-template-columns:repeat(4,1fr);} }
  .tile{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--bg2);cursor:pointer;}
  .tile img,.tile video{width:100%;height:100%;object-fit:cover;display:block;}
  .tile .playbadge{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;}
  .tile .playbadge svg{width:11px;height:11px;fill:#fff;}
  .tile.text{padding:16px;display:flex;align-items:center;background:linear-gradient(160deg,#1c1c1e,#141416);}
  .tile.text p{font-size:14px;line-height:1.45;color:var(--label);display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;margin:0;font-weight:500;}
  .tile .timestamp{position:absolute;left:8px;bottom:8px;font-size:10.5px;color:rgba(255,255,255,0.75);background:rgba(0,0,0,0.35);padding:2px 6px;border-radius:6px;font-weight:500;}
  .tile.text .timestamp{color:var(--label2);background:none;padding:0;}
  .empty{text-align:center;color:var(--label2);font-size:14px;padding:70px 24px;line-height:1.6;}
  .fab{position:fixed;right:20px;bottom:28px;z-index:30;width:56px;height:56px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(10,132,255,0.45);cursor:pointer;}
  .fab svg{width:24px;height:24px;fill:#fff;}
  .fab:active{transform:scale(0.94);}
  .overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:600px;background:#161618;border-radius:20px 20px 0 0;padding:10px 18px 26px;max-height:88vh;overflow-y:auto;}
  .handle{width:36px;height:5px;border-radius:3px;background:var(--sep);margin:4px auto 14px;}
  .sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .sheethead .cancel{color:var(--accent);font-size:16px;background:none;border:none;padding:6px 4px;font-weight:400;}
  .sheethead .postbtn{color:#fff;font-size:15px;font-weight:600;background:var(--accent);border:none;border-radius:16px;padding:7px 16px;}
  .sheethead .postbtn:disabled{opacity:0.4;}
  .sheethead h2{font-size:16px;font-weight:600;margin:0;}
  textarea{width:100%;border:none;background:transparent;color:var(--label);font-family:inherit;font-size:16px;line-height:1.5;padding:6px 0;resize:none;min-height:60px;}
  textarea::placeholder{color:var(--label3);}
  textarea:focus{outline:none;}
  .attachrow{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:0.5px solid var(--sep);margin-top:6px;}
  .attachbtn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:none;border-radius:14px;padding:8px 14px;color:var(--label);font-size:13px;font-weight:500;}
  .attachbtn svg{width:15px;height:15px;fill:var(--accent);}
  input[type=file]{display:none;}
  .preview{display:none;position:relative;margin-top:12px;border-radius:14px;overflow:hidden;background:var(--bg2);}
  .preview.show{display:block;}
  .preview img,.preview video{width:100%;max-height:240px;object-fit:cover;display:block;}
  .preview .removebtn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;display:flex;align-items:center;justify-content:center;}
  .preview .removebtn svg{width:12px;height:12px;fill:#fff;}
  .status{font-size:12.5px;color:var(--label2);margin-top:10px;line-height:1.5;}
  .status.err{color:var(--danger);}
  .lightbox{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.94);display:none;flex-direction:column;}
  .lightbox.show{display:flex;}
  .lbtop{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;padding-top:max(14px, env(safe-area-inset-top));}
  .lbtop button{background:rgba(255,255,255,0.12);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .lbtop button svg{width:15px;height:15px;fill:#fff;}
  .lbbody{flex:1;display:flex;align-items:center;justify-content:center;padding:0 16px;overflow:hidden;}
  .lbbody img,.lbbody video{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain;}
  .lbbody p{font-size:19px;line-height:1.5;color:var(--label);font-weight:500;white-space:pre-wrap;text-align:center;}
  .lbcaption{padding:16px 20px 6px;font-size:14.5px;line-height:1.5;color:var(--label);}
  .lbmeta{padding:0 20px 24px;font-size:12.5px;color:var(--label2);padding-bottom:max(24px, env(safe-area-inset-bottom));}
</style>
</head>
<body>

<nav>
  <div class="navrow">
    <div class="title">TMAsnaps</div>
    <div class="count" id="count">0 posts</div>
  </div>
</nav>

<div class="wrap"><div class="grid" id="feed"></div></div>

<button class="fab" id="fabBtn" aria-label="New post">
  <svg viewBox="0 0 24 24"><path d="M11 5a1 1 0 0 1 2 0v6h6a1 1 0 0 1 0 2h-6v6a1 1 0 0 1-2 0v-6H5a1 1 0 0 1 0-2h6V5z"/></svg>
</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheethead">
      <button class="cancel" id="cancelBtn">Cancel</button>
      <h2>New post</h2>
      <button class="postbtn" id="postBtn">Post</button>
    </div>
    <textarea id="caption" placeholder="Say something..." rows="2"></textarea>
    <div class="preview" id="preview">
      <img id="previewImg" style="display:none">
      <video id="previewVid" style="display:none" muted></video>
      <button class="removebtn" id="clearFile" type="button">
        <svg viewBox="0 0 24 24"><path d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7l-1.4-1.4L9.2 12 2.9 5.7l1.4-1.4L10.6 10.6l6.3-6.3z"/></svg>
      </button>
    </div>
    <div class="attachrow">
      <button class="attachbtn" id="attachBtn" type="button">
        <svg viewBox="0 0 24 24"><path d="M5 5h11l3 3v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm7 6a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
        Photo or video
      </button>
      <input type="file" id="fileInput" accept="image/*,video/*">
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lbtop">
    <button id="lbClose"><svg viewBox="0 0 24 24"><path d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7l-1.4-1.4L9.2 12 2.9 5.7l1.4-1.4L10.6 10.6l6.3-6.3z"/></svg></button>
    <button id="lbDelete"><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13.1a1 1 0 0 1-1 .9H8a1 1 0 0 1-1-.9L6 7zm3-3h6l1 2H8l1-2z"/></svg></button>
  </div>
  <div class="lbbody" id="lbBody"></div>
  <div class="lbcaption" id="lbCaption"></div>
  <div class="lbmeta" id="lbMeta"></div>
</div>

<script type="module">
const feedEl = document.getElementById('feed');
const countEl = document.getElementById('count');
const fabBtn = document.getElementById('fabBtn');
const overlay = document.getElementById('overlay');
const cancelBtn = document.getElementById('cancelBtn');
const postBtn = document.getElementById('postBtn');
const captionEl = document.getElementById('caption');
const attachBtn = document.getElementById('attachBtn');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewVid = document.getElementById('previewVid');
const clearFileBtn = document.getElementById('clearFile');
const statusEl = document.getElementById('status');
const lightbox = document.getElementById('lightbox');
const lbBody = document.getElementById('lbBody');
const lbCaption = document.getElementById('lbCaption');
const lbMeta = document.getElementById('lbMeta');
const lbClose = document.getElementById('lbClose');
const lbDelete = document.getElementById('lbDelete');

let pendingFile = null;
let currentLightboxId = null;
const MAX_BYTES = 3.5 * 1024 * 1024;

function setStatus(msg, isErr){
  statusEl.textContent = msg || '';
  statusEl.className = 'status' + (isErr ? ' err' : '');
}

fabBtn.addEventListener('click', () => { overlay.classList.add('show'); captionEl.focus(); });
cancelBtn.addEventListener('click', closeSheet);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });
function closeSheet(){
  overlay.classList.remove('show');
  captionEl.value = '';
  pendingFile = null;
  fileInput.value = '';
  preview.classList.remove('show');
  setStatus('');
}

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { const f = e.target.files[0]; if (f) handleFile(f); });
clearFileBtn.addEventListener('click', () => {
  pendingFile = null; fileInput.value = ''; preview.classList.remove('show'); setStatus('');
});

function handleFile(file){
  setStatus('');
  if (file.type.startsWith('image/')) {
    compressImage(file).then(blob => {
      pendingFile = { type: 'image', blob, mime: 'image/jpeg' };
      showPreview('image', URL.createObjectURL(blob));
    }).catch(() => setStatus("Couldn't read that image.", true));
  } else if (file.type.startsWith('video/')) {
    if (file.size > MAX_BYTES) {
      setStatus(`That clip is ${(file.size/1024/1024).toFixed(1)}MB — keep clips under ~3.5MB for now.`, true);
      return;
    }
    pendingFile = { type: 'video', blob: file, mime: file.type };
    showPreview('video', URL.createObjectURL(file));
  } else {
    setStatus('Images or videos only.', true);
  }
}

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function compressImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      const maxDim = 1600;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale); height = Math.round(height * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('encode failed')), 'image/jpeg', 0.85);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showPreview(type, url){
  preview.classList.add('show');
  if (type === 'image') { previewImg.src = url; previewImg.style.display='block'; previewVid.style.display='none'; }
  else { previewVid.src = url; previewVid.style.display='block'; previewImg.style.display='none'; }
}

postBtn.addEventListener('click', async () => {
  const caption = captionEl.value.trim();
  if (!caption && !pendingFile) { setStatus('Add a photo, video, or write something first.', true); return; }
  postBtn.disabled = true;
  try {
    let mediaBase64 = null, mediaMime = null;
    if (pendingFile) {
      setStatus('Uploading...');
      mediaBase64 = await blobToBase64(pendingFile.blob);
      mediaMime = pendingFile.mime;
    }
    setStatus('Posting...');
    const res = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ caption, type: pendingFile ? pendingFile.type : 'text', mediaBase64, mediaMime })
    });
    if (!res.ok) throw new Error('post failed');
    closeSheet();
    await loadFeed();
  } catch (err) {
    console.error(err);
    setStatus('Post failed — try again.', true);
  } finally {
    postBtn.disabled = false;
  }
});

let allPosts = [];

function timeLabel(ts){
  return new Date(ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

function renderTile(p){
  const div = document.createElement('div');
  if (p.type === 'text') {
    div.className = 'tile text';
    div.innerHTML = `<p></p><span class="timestamp"></span>`;
    div.querySelector('p').textContent = p.caption;
    div.querySelector('.timestamp').textContent = timeLabel(p.ts);
  } else {
    div.className = 'tile';
    const media = p.type === 'image'
      ? `<img src="${p.mediaUrl}" alt="post" loading="lazy">`
      : `<video src="${p.mediaUrl}" muted preload="metadata"></video><div class="playbadge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`;
    div.innerHTML = media + `<span class="timestamp"></span>`;
    div.querySelector('.timestamp').textContent = timeLabel(p.ts);
  }
  div.addEventListener('click', () => openLightbox(p.id));
  return div;
}

function openLightbox(id){
  const p = allPosts.find(x => x.id === id);
  if (!p) return;
  currentLightboxId = id;
  if (p.type === 'image') lbBody.innerHTML = `<img src="${p.mediaUrl}">`;
  else if (p.type === 'video') lbBody.innerHTML = `<video src="${p.mediaUrl}" controls autoplay playsinline></video>`;
  else { lbBody.innerHTML = `<p></p>`; lbBody.querySelector('p').textContent = p.caption; }
  if (p.type !== 'text' && p.caption) { lbCaption.textContent = p.caption; lbCaption.style.display='block'; }
  else { lbCaption.textContent=''; lbCaption.style.display='none'; }
  lbMeta.textContent = timeLabel(p.ts);
  lightbox.classList.add('show');
}
lbClose.addEventListener('click', closeLightbox);
function closeLightbox(){ lightbox.classList.remove('show'); lbBody.innerHTML=''; currentLightboxId=null; }
lbDelete.addEventListener('click', async () => {
  if (!currentLightboxId) return;
  const p = allPosts.find(x => x.id === currentLightboxId);
  try {
    const params = new URLSearchParams({ id: currentLightboxId });
    if (p && p.mediaPath) params.set('mediaPath', p.mediaPath);
    await fetch('/api/posts?' + params.toString(), { method: 'DELETE' });
    closeLightbox();
    await loadFeed();
  } catch (e) { closeLightbox(); }
});

async function loadFeed(){
  try {
    const res = await fetch('/api/posts');
    allPosts = await res.json();
  } catch (e) {
    feedEl.innerHTML = '<div class="empty">Couldn\'t load posts. Check back in a moment.</div>';
    return;
  }
  countEl.textContent = allPosts.length + (allPosts.length === 1 ? ' post' : ' posts');
  if (!allPosts.length) {
    feedEl.innerHTML = '<div class="empty">Nothing here yet.<br>Tap + to share your first post.</div>';
    return;
  }
  feedEl.innerHTML = '';
  allPosts.forEach(p => feedEl.appendChild(renderTile(p)));
}

loadFeed();
setInterval(loadFeed, 6000); // light polling so everyone stays in sync
</script>
</body>
</html>
